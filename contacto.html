<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Slider Pro</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <img src="assets/logo.svg" alt="Slider Pro">
                <h1>Slider Pro</h1>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="catalogo.html">Catálogo</a></li>
                <li><a href="contacto.html" class="active">Contacto</a></li>
                <li><a href="admin/login.html">Admin</a></li>
            </ul>
        </div>
    </nav>

    <!-- Hero / Slider -->
    <section class="hero">
        <div class="slider" id="slider">
            <button class="prev" id="prev">❮</button>
            <div class="slides">
                <img class="slide" src="https://placehold.co/900x350?text=Slide+1" alt="Slide 1">
                <img class="slide" src="https://placehold.co/900x350?text=Slide+2" alt="Slide 2">
                <img class="slide" src="https://placehold.co/900x350?text=Slide+3" alt="Slide 3">
            </div>
            <button class="next" id="next">❯</button>
        </div>
    </section>

    <!-- Formulario de Contacto -->
    <section class="contact">
        <div class="container">
            <h2>Contacto</h2>
            <form id="contactForm" class="contact-form">
                <input type="text" id="name" placeholder="Nombre" required>
                <input type="email" id="email" placeholder="Email" required>
                <input type="tel" id="phone" placeholder="Teléfono" required>
                <textarea id="message" placeholder="Mensaje" rows="5" required></textarea>
                <button type="submit" class="btn">Enviar Mensaje</button>
            </form>
            <div id="contactMessage" class="message"></div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Slider Pro. Todos los derechos reservados.</p>
    </footer>

    <script src="js/whatsapp.js"></script>
</body>
</html>
